<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artin gpt Web UI V1.9 (Multi-File, Vision & PDF)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- PDF.js for Reading PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #ececf1; }
        .sidebar { background-color: #121212; }
        .message-bot { background-color: #2d2d2d; }
        .message-user { background-color: #1e1e1e; }
        .markdown-body pre { background-color: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; position: relative; direction: ltr;}
        .markdown-body code { font-family: monospace; color: #10b981; }
        .think-box { border-left: 4px solid #6b7280; background-color: #262626; padding: 0.5rem 1rem; margin: 0.5rem 0; border-radius: 0.25rem; font-style: italic; color: #9ca3af; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #acacbe; }
        
        /* KaTeX rtl fix */
        .katex-display { direction: ltr; overflow-x: auto; overflow-y: hidden; padding: 0.5rem 0; }
        .katex { direction: ltr; }
    </style>
</head>
<body class="h-screen flex overflow-hidden relative">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black bg-opacity-60 z-30 md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar w-64 flex-shrink-0 flex flex-col p-2 transition-transform duration-300 absolute md:relative z-40 h-full -translate-x-full md:translate-x-0 shadow-2xl md:shadow-none">
        <button onclick="createNewChat()" class="flex items-center justify-center gap-2 p-3 border border-gray-600 rounded-md hover:bg-gray-700 transition w-full mb-4 text-sm font-semibold">
            <i class="fa fa-plus"></i> گفتگوی جدید
        </button>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-1 pr-1">
            <!-- لیست چت‌ها اینجا قرار می‌گیرد -->
        </div>
        <div class="mt-auto border-t border-gray-600 pt-2 space-y-2">
            <button onclick="toggleSettings()" class="flex items-center gap-2 p-3 rounded-md hover:bg-gray-700 w-full text-right text-sm">
                <i class="fa fa-cog"></i> تنظیمات کاربر
            </button>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col relative w-full">
        <!-- Header -->
        <div class="h-14 border-b border-gray-600 flex items-center justify-between px-4 bg-[#1e1e1e] shadow-sm z-10 w-full">
            <div class="flex items-center gap-3 overflow-hidden">
                <!-- Mobile Menu Button -->
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white transition-colors">
                    <i class="fa fa-bars text-xl"></i>
                </button>
                <h1 id="chat-title" class="font-semibold truncate text-gray-200">گفتگوی جدید</h1>
            </div>
            
            <div class="flex gap-3 md:gap-4 items-center text-gray-400 flex-shrink-0">
                <button id="quick-think-btn" onclick="toggleQuickThink()" title="روشن/خاموش کردن تفکر" class="flex items-center gap-1 md:gap-2 px-2 py-1 rounded transition-colors hover:bg-gray-700">
                    <i class="fa fa-brain"></i> <span class="text-[10px] md:text-xs font-semibold" id="think-status-text">تفکر</span>
                </button>
                <div class="w-px h-6 bg-gray-600 hidden md:block"></div>
                <button onclick="exportChat()" title="خروجی TXT"><i class="fa fa-download hover:text-white"></i></button>
                <button onclick="clearChats()" title="حذف همه داده‌ها"><i class="fa fa-trash hover:text-red-500"></i></button>
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-2 md:p-4 space-y-6 pb-40 scroll-smooth w-full">
            <!-- پیام‌ها اینجا قرار می‌گیرند -->
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#1e1e1e] via-[#1e1e1e] to-transparent p-2 md:p-4 z-20">
            <div class="max-w-4xl mx-auto relative">
                
                <!-- Attachment Preview -->
                <div id="attachment-preview" class="hidden absolute bottom-[calc(100%+0.5rem)] right-0 bg-[#252526] p-2 rounded-lg border border-gray-600 shadow-lg mb-2 max-w-full overflow-x-auto">
                </div>

                <div class="flex items-center bg-[#252526] rounded-xl shadow-lg border border-gray-600 focus-within:border-gray-400 p-1 md:p-2">
                    
                    <input type="file" id="file-input" class="hidden" multiple accept="image/*,.txt,.py,.js,.html,.css,.json,.md,.csv,.pdf" onchange="handleFileUpload(event)">
                    
                    <button onclick="document.getElementById('file-input').click()" class="p-2 text-gray-400 hover:text-white rounded-lg transition-colors" title="پیوست فایل">
                        <i class="fa fa-paperclip text-lg md:text-base"></i>
                    </button>
                    
                    <button id="mic-btn" onclick="toggleVoice()" class="p-2 text-gray-400 hover:text-white rounded-lg hidden md:block" title="تایپ صوتی"><i class="fa fa-microphone text-lg md:text-base"></i></button>
                    
                    <textarea id="message-input" rows="1" class="w-full bg-transparent text-white outline-none resize-none px-2 md:px-3 py-2 max-h-32 text-sm md:text-base" placeholder="پیام خود را بنویسید..." onkeydown="handleKeydown(event)"></textarea>
                    
                    <button id="stop-btn" onclick="stopGeneration()" class="hidden p-2 text-red-500 hover:text-red-400 rounded-lg mx-1" title="توقف"><i class="fa fa-stop-circle text-2xl md:text-xl"></i></button>
                    <button id="send-btn" onclick="sendMessage()" class="p-2 text-gray-400 hover:bg-green-600 hover:text-white rounded-lg transition" title="ارسال"><i class="fa fa-paper-plane text-xl md:text-base"></i></button>
                </div>
            </div>
            
            <div class="max-w-4xl mx-auto text-center text-[10px] md:text-xs text-gray-500 mt-2 flex justify-between items-center px-2" id="stats-bar">
                <span id="word-count">کلمات: 0</span>
                <span id="token-count" class="font-mono transition-colors">توکن: 0 / 36671 (0.0%)</span>
            </div>
        </div>
    </div>

    <!-- Modal ها همانند قبل در اینجا قرار میگیرند (برای کوتاه شدن کد خلاصه شده، کد خودتان را حفظ کنید) -->
    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-[#121212] w-full md:w-96 p-6 rounded-lg shadow-xl border border-gray-700">
            <h2 class="text-xl mb-4 font-bold border-b border-gray-600 pb-2"><i class="fa fa-sliders"></i> تنظیمات سیستم</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-gray-300">نام کاربری شما:</label>
                    <input type="text" id="set-username" class="w-full bg-[#1e1e1e] text-white rounded p-2 outline-none border border-gray-600">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-gray-300">دستورالعمل پایه:</label>
                    <textarea id="set-system" class="w-full bg-[#1e1e1e] text-white rounded p-2 outline-none border border-gray-600 h-24 resize-none"></textarea>
                </div>
                <div class="flex items-center justify-between bg-[#1e1e1e] p-3 rounded border border-gray-600">
                    <label class="text-sm text-gray-300">استفاده از قابلیت استدلال</label>
                    <input type="checkbox" id="set-think" class="w-4 h-4 accent-green-500">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 bg-gray-700 text-white rounded">انصراف</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-green-600 text-white rounded">ذخیره</button>
            </div>
        </div>
    </div>

    <!-- Edit Message Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-[#121212] w-full md:w-[500px] p-6 rounded-lg shadow-xl border border-gray-700">
            <h2 class="text-xl mb-4 font-bold border-b border-gray-600 pb-2"><i class="fa fa-pencil"></i> ویرایش پیام</h2>
            <textarea id="edit-content" class="w-full bg-[#1e1e1e] text-white rounded p-3 outline-none border border-gray-600 h-48 resize-none"></textarea>
            <div class="mt-4 flex justify-end gap-2">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-700 text-white rounded">انصراف</button>
                <button onclick="saveEditMessage()" class="px-4 py-2 bg-blue-600 text-white rounded">اعمال</button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const API_URL = 'https://passive-chubby-shelf.ngrok-free.dev/v1/chat/completions';
        const MAX_TOKENS = 36671;
        let chats = JSON.parse(localStorage.getItem('ai_chats')) || [];
        let currentChatId = localStorage.getItem('ai_current_chat') || null;
        let settings = JSON.parse(localStorage.getItem('ai_settings')) || { username: 'کاربر', systemPrompt: 'شما یک دستیار هوش مصنوعی مفید هستید. لطفا برای فرمول‌های ریاضی همیشه از علامت $ استفاده کن.', showThink: true };
        let abortController = null;
        let isGenerating = false;
        let editingMessageIndex = -1;
        let currentAttachments = []; 

        // === توابع موبایل ===
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function closeSidebarOnMobile() {
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('mobile-overlay').classList.add('hidden');
            }
        }
        // ===================

        document.addEventListener('DOMContentLoaded', () => {
            if (chats.length === 0) createNewChat();
            else {
                if (!currentChatId || !chats.find(c => c.id === currentChatId)) currentChatId = chats[0].id;
                renderChatList();
                renderMessages();
                updateStats();
            }
            document.getElementById('message-input').addEventListener('input', updateStats);
            updateThinkButtonState();
        });

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('send-btn').classList.add('opacity-50');
            for (let i = 0; i < files.length; i++) {
                if (files[i].size > 5 * 1024 * 1024) continue;
                await processFile(files[i]);
            }
            renderAttachmentPreview();
            event.target.value = ''; 
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').classList.remove('opacity-50');
        }

        function processFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                if (file.name.toLowerCase().endsWith('.pdf') || file.type === 'application/pdf') {
                    reader.onload = async function(e) {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            let fullText = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                fullText += `\n\n--- صفحه ${i} ---\n` + textContent.items.map(item => item.str).join(' ');
                            }
                            currentAttachments.push({ type: 'text', data: fullText.trim(), name: file.name });
                        } catch (error) {}
                        resolve();
                    };
                    reader.readAsArrayBuffer(file);
                } else if (file.type.startsWith('image/')) {
                    reader.onload = function(e) {
                        currentAttachments.push({ type: 'image', data: e.target.result, name: file.name });
                        resolve();
                    };
                    reader.readAsDataURL(file);
                } else {
                    reader.onload = function(e) {
                        currentAttachments.push({ type: 'text', data: e.target.result, name: file.name });
                        resolve();
                    };
                    reader.readAsText(file);
                }
            });
        }

        function renderAttachmentPreview() {
            const previewBox = document.getElementById('attachment-preview');
            if (currentAttachments.length === 0) return previewBox.classList.add('hidden');
            previewBox.classList.remove('hidden');
            let contentHtml = '<div class="flex gap-3 whitespace-nowrap pb-1">';
            currentAttachments.forEach((att, index) => {
                if (att.type === 'image') {
                    contentHtml += `<div class="relative group p-1 bg-white rounded inline-block"><button onclick="removeAttachment(${index})" class="absolute -top-2 -right-2 bg-gray-300 rounded-full w-5 h-5 flex items-center justify-center text-xs z-10"><i class="fa fa-times"></i></button><img src="${att.data}" class="h-10 w-10 object-contain rounded"></div>`;
                } else {
                    contentHtml += `<div class="relative bg-[#353535] rounded-md py-1 px-3 inline-block min-w-[100px]"><button onclick="removeAttachment(${index})" class="absolute -top-2 -right-2 bg-gray-300 rounded-full w-5 h-5 flex items-center justify-center text-xs z-10"><i class="fa fa-times"></i></button><div class="flex items-center gap-2"><div class="flex-1 min-w-0"><p class="text-xs text-white truncate" dir="ltr">${att.name}</p></div><i class="fa fa-file-alt text-gray-400"></i></div></div>`;
                }
            });
            previewBox.innerHTML = contentHtml + '</div>';
        }

        function removeAttachment(index) { currentAttachments.splice(index, 1); renderAttachmentPreview(); }

        function createNewChat() {
            if (isGenerating) return;
            const newChat = { id: Date.now().toString(), title: 'گفتگوی جدید', messages: [] };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveData(); renderChatList(); renderMessages(); updateStats(); closeSidebarOnMobile();
        }

        function saveData() { localStorage.setItem('ai_chats', JSON.stringify(chats)); localStorage.setItem('ai_current_chat', currentChatId); localStorage.setItem('ai_settings', JSON.stringify(settings)); }
        function getCurrentChat() { return chats.find(c => c.id === currentChatId); }

        function switchChat(id) {
            if (isGenerating) return;
            currentChatId = id;
            saveData(); renderChatList(); renderMessages(); updateStats(); closeSidebarOnMobile();
        }

        function editChatTitle(id) {
            if (isGenerating) return;
            const chat = chats.find(c => c.id === id);
            const newTitle = prompt('عنوان جدید این گفتگو را وارد کنید:', chat.title);
            if (newTitle && newTitle.trim() !== '') { chat.title = newTitle.trim(); saveData(); renderChatList(); }
        }

        function deleteSingleChat(id) {
            if (isGenerating) return;
            if (confirm('آیا از حذف این گفتگو مطمئن هستید؟')) {
                chats = chats.filter(c => c.id !== id);
                if (chats.length === 0) createNewChat();
                else if (currentChatId === id) switchChat(chats[0].id);
                else { saveData(); renderChatList(); }
            }
        }

        function renderChatList() {
            document.getElementById('chat-list').innerHTML = chats.map(chat => `
                <div class="flex items-center justify-between w-full p-2 rounded-md transition group ${chat.id === currentChatId ? 'bg-gray-700 text-white' : 'hover:bg-gray-800 text-gray-400'}">
                    <button onclick="switchChat('${chat.id}')" class="flex-1 text-right truncate flex items-center text-sm"><i class="fa fa-message ml-2 text-xs opacity-70"></i><span class="truncate">${chat.title}</span></button>
                    <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity pr-2 gap-2 text-xs">
                        <button onclick="editChatTitle('${chat.id}')" class="hover:text-blue-400"><i class="fa fa-pencil"></i></button>
                        <button onclick="deleteSingleChat('${chat.id}')" class="hover:text-red-500"><i class="fa fa-trash"></i></button>
                    </div></div>`).join('');
            document.getElementById('chat-title').innerText = getCurrentChat()?.title || 'LM Studio';
        }

        function renderMessages() {
            const container = document.getElementById('chat-container');
            const chat = getCurrentChat();
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-500 space-y-4 opacity-50"><i class="fa fa-robot text-6xl"></i><p>آماده گفتگو با شما</p></div>`;
                return;
            }
            container.innerHTML = chat.messages.map((msg, index) => {
                let textToParse = '', imageHtml = '';
                if (Array.isArray(msg.content)) {
                    textToParse = msg.content.find(c => c.type === 'text')?.text || '';
                    const imgs = msg.content.filter(c => c.type === 'image_url');
                    if (imgs.length > 0) imageHtml = '<div class="flex flex-wrap gap-2 mb-3">' + imgs.map(img => `<img src="${img.image_url.url}" class="max-w-full md:max-w-xs max-h-64 object-cover rounded-lg border border-gray-600">`).join('') + '</div>';
                } else textToParse = msg.content;

                textToParse = settings.showThink ? textToParse.replace(/<think>([\s\S]*?)<\/think>/g, '<div class="think-box"><strong>تفکر:</strong><br>$1</div>') : textToParse.replace(/<think>([\s\S]*?)<\/think>/g, '');
                return `<div class="flex flex-col ${msg.role === 'user' ? 'items-start message-user' : 'items-start message-bot'} p-3 md:p-4 rounded-lg w-full relative group border border-transparent hover:border-gray-700"><div class="font-bold mb-2 text-xs md:text-sm text-gray-400 flex items-center w-full"><i class="fa ${msg.role === 'user' ? 'fa-user text-blue-500' : 'fa-robot text-green-500'} ml-2"></i>${msg.role === 'user' ? settings.username : 'دستیار هوش مصنوعی'}<div class="mr-auto flex items-center gap-3"><button onclick="deleteMessage(${index})" class="text-gray-500 hover:text-red-500 opacity-100 md:opacity-0 group-hover:opacity-100"><i class="fa fa-trash"></i></button><button onclick="openEditModal(${index})" class="text-gray-500 hover:text-blue-400 opacity-100 md:opacity-0 group-hover:opacity-100"><i class="fa fa-pencil"></i></button><span class="text-[10px] md:text-xs text-gray-600 font-normal">${msg.time || ''}</span></div></div><div class="markdown-body w-full overflow-hidden text-sm leading-relaxed">${imageHtml + marked.parse(textToParse)}</div></div>`;
            }).join('');
            renderMathInElement(container, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}], throwOnError: false });
            container.scrollTop = container.scrollHeight;
        }

        function updateStats() {
            const txt = document.getElementById('message-input').value.trim();
            document.getElementById('word-count').innerText = `کلمات: ${txt ? txt.split(/\s+/).length : 0}`;
        }

        function deleteMessage(index) {
            if (isGenerating) return;
            if (confirm('آیا از حذف این پیام اطمینان دارید؟')) { getCurrentChat().messages.splice(index, 1); saveData(); renderMessages(); updateStats(); }
        }

        function openEditModal(index) {
            if (isGenerating) return;
            editingMessageIndex = index;
            let content = getCurrentChat().messages[index].content;
            document.getElementById('edit-content').value = Array.isArray(content) ? content.find(c => c.type === 'text')?.text || '' : content;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() { editingMessageIndex = -1; document.getElementById('edit-modal').classList.add('hidden'); }

        async function saveEditMessage() {
            if (editingMessageIndex > -1) {
                const chat = getCurrentChat();
                const isUser = chat.messages[editingMessageIndex].role === 'user';
                const newTxt = document.getElementById('edit-content').value;
                if (Array.isArray(chat.messages[editingMessageIndex].content)) {
                    chat.messages[editingMessageIndex].content = [{ type: 'text', text: newTxt }, ...chat.messages[editingMessageIndex].content.filter(c => c.type === 'image_url')];
                } else chat.messages[editingMessageIndex].content = newTxt;
                
                if (isUser) { chat.messages = chat.messages.slice(0, editingMessageIndex + 1); saveData(); renderMessages(); closeEditModal(); await fetchAIResponse(chat); }
                else { saveData(); renderMessages(); closeEditModal(); }
            }
        }

        function handleKeydown(e) { if (e.key === 'Enter' && !e.shiftKey && window.innerWidth >= 768) { e.preventDefault(); sendMessage(); } }
        function toggleQuickThink() { settings.showThink = !settings.showThink; saveData(); updateThinkButtonState(); renderMessages(); }
        function updateThinkButtonState() {
            const btn = document.getElementById('quick-think-btn'), txt = document.getElementById('think-status-text');
            if(settings.showThink) { btn.classList.replace('text-gray-400', 'text-green-500'); txt.innerText = 'تفکر روشن'; } 
            else { btn.classList.replace('text-green-500', 'text-gray-400'); txt.innerText = 'تفکر خاموش'; }
        }

        async function sendMessage() {
            if (isGenerating) return;
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text && currentAttachments.length === 0) return; 

            const chat = getCurrentChat();
            let combinedText = text, imageObjects = [];
            currentAttachments.forEach(att => {
                if (att.type === 'text') combinedText += `\n\n--- فایل: ${att.name} ---\n${att.data}`;
                else if (att.type === 'image') imageObjects.push({ type: "image_url", image_url: { url: att.data } });
            });

            chat.messages.push({ role: 'user', content: imageObjects.length > 0 ? [{ type: "text", text: combinedText || "بررسی کن" }, ...imageObjects] : combinedText, time: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }) });
            if (chat.title === 'گفتگوی جدید') chat.title = text ? text.substring(0, 30) + '...' : 'پیوست فایل';
            
            input.value = ''; input.style.height = 'auto'; currentAttachments = []; renderAttachmentPreview(); updateStats(); renderChatList(); renderMessages();
            await fetchAIResponse(chat);
        }

        async function fetchAIResponse(chat) {
            isGenerating = true; abortController = new AbortController();
            document.getElementById('send-btn').classList.add('hidden'); document.getElementById('stop-btn').classList.remove('hidden');
            chat.messages.push({ role: 'assistant', content: '', time: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }) });
            const botMsgIndex = chat.messages.length - 1;

            try {
                let finalSys = settings.systemPrompt;
                if (!settings.showThink) finalSys += "\n\nCRITICAL: DO NOT use <think> tags.";
                const apiMessages = [{ role: 'system', content: finalSys }, ...chat.messages.slice(0, -1).map(m => ({role: m.role, content: m.content}))];

                const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: "local-model", messages: apiMessages, stream: true, enable_thinking: settings.showThink }), signal: abortController.signal });
                if (!response.ok) throw new Error('خطا در ارتباط با سرور');
                
                const reader = response.body.getReader(), decoder = new TextDecoder("utf-8");
                while (true) {
                    const { done, value } = await reader.read(); if (done) break;
                    const lines = decoder.decode(value, { stream: true }).split('\n').filter(l => l.trim() !== '');
                    for (const line of lines) {
                        if (line.includes('[DONE]')) break;
                        if (line.startsWith('data: ')) {
                            try { const data = JSON.parse(line.substring(6)); if (data.choices[0].delta.content) { chat.messages[botMsgIndex].content += data.choices[0].delta.content; renderMessages(); } } catch(e){}
                        }
                    }
                }
            } catch (err) { chat.messages[botMsgIndex].content += err.name === 'AbortError' ? '\n\n*(متوقف شد)*' : `\n\n**[خطا]** ${err.message}`; renderMessages(); }
            finally { isGenerating = false; saveData(); document.getElementById('send-btn').classList.remove('hidden'); document.getElementById('stop-btn').classList.add('hidden'); }
        }

        function stopGeneration() { if (abortController) abortController.abort(); }
        function clearChats() { if(confirm('حذف همه؟')) { localStorage.clear(); chats = []; createNewChat(); } }
        function exportChat() { /* کد خروجی مشابه قبل است، برای طولانی نشدن حذف نشد اما در استفاده شخصی وجود دارد */ }
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            if (modal.classList.contains('hidden')) { document.getElementById('set-username').value = settings.username; document.getElementById('set-system').value = settings.systemPrompt; document.getElementById('set-think').checked = settings.showThink; modal.classList.remove('hidden'); }
            else modal.classList.add('hidden');
        }
        function saveSettings() { settings.username = document.getElementById('set-username').value || 'کاربر'; settings.systemPrompt = document.getElementById('set-system').value; settings.showThink = document.getElementById('set-think').checked; saveData(); updateThinkButtonState(); toggleSettings(); renderMessages(); }
        document.getElementById('message-input').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
        function toggleVoice() { /* کد تایپ صوتی مشابه قبل */ }
    </script>
</body>
</html>
