<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artin gpt Web UI V1.7</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #ececf1; }
        .sidebar { background-color: #121212; }
        .message-bot { background-color: #2d2d2d; }
        .message-user { background-color: #1e1e1e; }
        .markdown-body pre { background-color: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; position: relative; direction: ltr;}
        .markdown-body code { font-family: monospace; color: #10b981; }
        .think-box { border-left: 4px solid #6b7280; background-color: #262626; padding: 0.5rem 1rem; margin: 0.5rem 0; border-radius: 0.25rem; font-style: italic; color: #9ca3af; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #acacbe; }
        
        /* KaTeX rtl fix */
        .katex-display { direction: ltr; overflow-x: auto; overflow-y: hidden; padding: 0.5rem 0; }
        .katex { direction: ltr; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <div class="sidebar w-64 flex-shrink-0 flex flex-col p-2 transition-all duration-300">
        <button onclick="createNewChat()" class="flex items-center justify-center gap-2 p-3 border border-gray-600 rounded-md hover:bg-gray-700 transition w-full mb-4 text-sm font-semibold">
            <i class="fa fa-plus"></i> گفتگوی جدید
        </button>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-1 pr-1">
            <!-- لیست چت‌ها اینجا قرار می‌گیرد -->
        </div>
        <div class="mt-auto border-t border-gray-600 pt-2 space-y-2">
            <button onclick="toggleSettings()" class="flex items-center gap-2 p-3 rounded-md hover:bg-gray-700 w-full text-right text-sm">
                <i class="fa fa-cog"></i> تنظیمات کاربر
            </button>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col relative">
        <!-- Header -->
        <div class="h-14 border-b border-gray-600 flex items-center justify-between px-4 bg-[#1e1e1e] shadow-sm z-10">
            <h1 id="chat-title" class="font-semibold truncate text-gray-200">گفتگوی جدید</h1>
            <div class="flex gap-4 items-center text-gray-400">
                <button id="quick-think-btn" onclick="toggleQuickThink()" title="روشن/خاموش کردن تفکر (Thinking)" class="flex items-center gap-2 px-2 py-1 rounded transition-colors hover:bg-gray-700">
                    <i class="fa fa-brain"></i> <span class="text-xs font-semibold" id="think-status-text">تفکر روشن</span>
                </button>
                <div class="w-px h-6 bg-gray-600"></div>
                <button onclick="exportChat()" title="خروجی TXT"><i class="fa fa-download hover:text-white"></i></button>
                <button onclick="clearChats()" title="حذف همه داده‌ها"><i class="fa fa-trash hover:text-red-500"></i></button>
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 pb-40 scroll-smooth">
            <!-- پیام‌ها اینجا قرار می‌گیرند -->
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#1e1e1e] via-[#1e1e1e] to-transparent p-4 z-20">
            <div class="max-w-4xl mx-auto relative">
                
                <!-- Attachment Preview -->
                <div id="attachment-preview" class="hidden absolute bottom-[calc(100%+0.5rem)] right-0 bg-[#252526] p-2 rounded-lg border border-gray-600 shadow-lg mb-2">
                    <!-- محتوای پیوست با جاوااسکریپت تزریق می‌شود -->
                </div>

                <div class="flex items-center bg-[#252526] rounded-xl shadow-lg border border-gray-600 focus-within:border-gray-400 p-2">
                    
                    <!-- File Input Hidden -->
                    <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(event)">
                    
                    <button onclick="document.getElementById('file-input').click()" class="p-2 text-gray-400 hover:text-white rounded-lg transition-colors" title="پیوست فایل (عکس، متن، کد)">
                        <i class="fa fa-paperclip"></i>
                    </button>
                    
                    <button id="mic-btn" onclick="toggleVoice()" class="p-2 text-gray-400 hover:text-white rounded-lg" title="تایپ صوتی"><i class="fa fa-microphone"></i></button>
                    
                    <textarea id="message-input" rows="1" class="w-full bg-transparent text-white outline-none resize-none px-3 py-2 max-h-32" placeholder="پیام خود را بنویسید... (Shift+Enter برای خط جدید)" onkeydown="handleKeydown(event)"></textarea>
                    
                    <button id="stop-btn" onclick="stopGeneration()" class="hidden p-2 text-red-500 hover:text-red-400 rounded-lg mx-1" title="توقف تولید"><i class="fa fa-stop-circle text-xl"></i></button>
                    <button id="send-btn" onclick="sendMessage()" class="p-2 text-gray-400 hover:bg-green-600 hover:text-white rounded-lg transition" title="ارسال"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
            
            <!-- مانیتورینگ توکن -->
            <div class="max-w-4xl mx-auto text-center text-xs text-gray-500 mt-2 flex justify-between items-center px-2" id="stats-bar">
                <span id="word-count">تعداد کلمات: 0</span>
                <span id="token-count" class="font-mono transition-colors">مصرف توکن: 0 / 36671 (0.0%)</span>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-[#121212] w-96 p-6 rounded-lg shadow-xl border border-gray-700">
            <h2 class="text-xl mb-4 font-bold border-b border-gray-600 pb-2"><i class="fa fa-sliders"></i> تنظیمات سیستم</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-gray-300">نام کاربری شما:</label>
                    <input type="text" id="set-username" class="w-full bg-[#1e1e1e] text-white rounded p-2 outline-none border border-gray-600 focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-gray-300">دستورالعمل پایه (System Prompt):</label>
                    <textarea id="set-system" class="w-full bg-[#1e1e1e] text-white rounded p-2 outline-none border border-gray-600 h-24 focus:border-blue-500 transition resize-none"></textarea>
                </div>
                <div class="flex items-center justify-between bg-[#1e1e1e] p-3 rounded border border-gray-600">
                    <label class="text-sm text-gray-300">استفاده از قابلیت استدلال (Think)</label>
                    <input type="checkbox" id="set-think" class="w-4 h-4 accent-green-500">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition">انصراف</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-500 transition">ذخیره تنظیمات</button>
            </div>
        </div>
    </div>

    <!-- Edit Message Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-[#121212] w-[500px] p-6 rounded-lg shadow-xl border border-gray-700">
            <h2 class="text-xl mb-4 font-bold border-b border-gray-600 pb-2"><i class="fa fa-pencil"></i> ویرایش پیام</h2>
            <p class="text-xs text-yellow-500 mb-2">توجه: در صورت ویرایش پیام خودتان، پیام‌های بعدی حذف شده و پاسخ جدیدی تولید می‌شود.</p>
            <textarea id="edit-content" class="w-full bg-[#1e1e1e] text-white rounded p-3 outline-none border border-gray-600 h-48 resize-none focus:border-blue-500"></textarea>
            <div class="mt-4 flex justify-end gap-2">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition">انصراف</button>
                <button onclick="saveEditMessage()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-500 transition">اعمال و بازسازی</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://passive-chubby-shelf.ngrok-free.dev/v1/chat/completions';

        const MAX_TOKENS = 36671;
        let chats = JSON.parse(localStorage.getItem('ai_chats')) || [];
        let currentChatId = localStorage.getItem('ai_current_chat') || null;
        let settings = JSON.parse(localStorage.getItem('ai_settings')) || { 
            username: 'کاربر', 
            systemPrompt: 'شما یک دستیار هوش مصنوعی مفید هستید. لطفا برای فرمول‌های ریاضی همیشه از علامت $ استفاده کن.', 
            showThink: true 
        };
        
        let abortController = null;
        let isGenerating = false;
        let editingMessageIndex = -1;

        // متغیرهای پیوست فایل
        let currentAttachment = null; // { type: 'image' | 'text', data: string, name: string }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            if (chats.length === 0) createNewChat();
            else {
                if (!currentChatId || !chats.find(c => c.id === currentChatId)) currentChatId = chats[0].id;
                renderChatList();
                renderMessages();
                updateStats();
            }
            document.getElementById('message-input').addEventListener('input', updateStats);
            updateThinkButtonState();
        });

        // ================= فایل‌ها و پیوست =================
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                alert('حجم فایل نباید بیشتر از ۵ مگابایت باشد.');
                event.target.value = '';
                return;
            }

            const reader = new FileReader();
            
            if (file.type.startsWith('image/')) {
                reader.onload = function(e) {
                    currentAttachment = { type: 'image', data: e.target.result, name: file.name };
                    renderAttachmentPreview();
                };
                reader.readAsDataURL(file);
            } 
            else if (file.type.startsWith('text/') || file.name.match(/\.(js|py|html|css|json|md|csv|txt|sh|cpp|c|java|xml)$/i)) {
                reader.onload = function(e) {
                    currentAttachment = { type: 'text', data: e.target.result, name: file.name };
                    renderAttachmentPreview();
                };
                reader.readAsText(file);
            } else {
                alert('این فرمت فایل پشتیبانی نمی‌شود.');
            }
            
            event.target.value = ''; 
        }

        function renderAttachmentPreview() {
            const previewBox = document.getElementById('attachment-preview');
            if (!currentAttachment) {
                previewBox.classList.add('hidden');
                return;
            }
            
            previewBox.classList.remove('hidden');
            let contentHtml = '';
            
            if (currentAttachment.type === 'image') {
                contentHtml = `
                    <div class="relative group p-1 bg-white rounded flex items-center justify-center">
                        <button onclick="removeAttachment()" class="absolute -top-2 -right-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-full w-5 h-5 flex items-center justify-center text-xs shadow-md transition z-10"><i class="fa fa-times"></i></button>
                        <img src="${currentAttachment.data}" class="h-12 w-12 object-contain rounded">
                    </div>
                `;
            } else {
                contentHtml = `
                    <div class="relative bg-[#353535] rounded-md py-1 px-3 flex flex-col justify-center max-w-[150px] min-w-[100px]">
                        <button onclick="removeAttachment()" class="absolute -top-2 -right-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-full w-5 h-5 flex items-center justify-center text-xs shadow-md transition z-10"><i class="fa fa-times"></i></button>
                        <div class="flex items-center gap-2">
                            <div class="flex-1 min-w-0">
                                <p class="text-xs text-white truncate" dir="ltr">${currentAttachment.name}</p>
                                <p class="text-[10px] text-gray-400">Text</p>
                            </div>
                            <i class="fa fa-file-alt text-gray-400 text-xl"></i>
                        </div>
                    </div>
                `;
            }
            previewBox.innerHTML = contentHtml;
        }

        function removeAttachment() {
            currentAttachment = null;
            renderAttachmentPreview();
        }

        // Core Functions
        function createNewChat() {
            if (isGenerating) return;
            const newChat = { id: Date.now().toString(), title: 'گفتگوی جدید', messages: [] };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveData();
            renderChatList();
            renderMessages();
            updateStats();
        }

        function saveData() {
            localStorage.setItem('ai_chats', JSON.stringify(chats));
            localStorage.setItem('ai_current_chat', currentChatId);
            localStorage.setItem('ai_settings', JSON.stringify(settings));
        }

        function getCurrentChat() {
            return chats.find(c => c.id === currentChatId);
        }

        function switchChat(id) {
            if (isGenerating) return;
            currentChatId = id;
            saveData();
            renderChatList();
            renderMessages();
            updateStats();
        }

        // Sidebar Actions
        function editChatTitle(id) {
            if (isGenerating) return;
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            const newTitle = prompt('عنوان جدید این گفتگو را وارد کنید:', chat.title);
            if (newTitle !== null && newTitle.trim() !== '') {
                chat.title = newTitle.trim();
                saveData();
                renderChatList();
            }
        }

        function deleteSingleChat(id) {
            if (isGenerating) return;
            if (confirm('آیا از حذف این گفتگو مطمئن هستید؟')) {
                chats = chats.filter(c => c.id !== id);
                if (chats.length === 0) createNewChat();
                else if (currentChatId === id) switchChat(chats[0].id);
                else {
                    saveData();
                    renderChatList();
                }
            }
        }

        // UI Rendering
        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(chat => `
                <div class="flex items-center justify-between w-full p-2 rounded-md transition group ${chat.id === currentChatId ? 'bg-gray-700 text-white' : 'hover:bg-gray-800 text-gray-400'}">
                    <button onclick="switchChat('${chat.id}')" class="flex-1 text-right truncate flex items-center text-sm">
                        <i class="fa fa-message ml-2 text-xs opacity-70"></i>
                        <span class="truncate">${chat.title}</span>
                    </button>
                    <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity pr-2 gap-2 text-xs">
                        <button onclick="editChatTitle('${chat.id}')" class="hover:text-blue-400 transition-colors" title="ویرایش عنوان"><i class="fa fa-pencil"></i></button>
                        <button onclick="deleteSingleChat('${chat.id}')" class="hover:text-red-500 transition-colors" title="حذف گفتگو"><i class="fa fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('chat-title').innerText = getCurrentChat()?.title || 'LM Studio';
        }

        function renderMessages() {
            const container = document.getElementById('chat-container');
            const chat = getCurrentChat();
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-500 space-y-4 opacity-50">
                    <i class="fa fa-robot text-6xl"></i>
                    <p>آماده گفتگو با شما</p>
                </div>`;
                return;
            }

            container.innerHTML = chat.messages.map((msg, index) => {
                let rawContent = msg.content;
                let textToParse = '';
                let imageHtml = '';

                // بررسی ساختار محتوا (برای عکس آرایه است، برای بقیه رشته)
                if (Array.isArray(rawContent)) {
                    const textObj = rawContent.find(c => c.type === 'text');
                    const imgObj = rawContent.find(c => c.type === 'image_url');
                    
                    if (textObj) textToParse = textObj.text;
                    if (imgObj) imageHtml = `<img src="${imgObj.image_url.url}" class="max-w-xs md:max-w-sm rounded-lg shadow-md mb-3">`;
                } else {
                    textToParse = rawContent;
                }

                // پردازش تگ Think
                if (settings.showThink) {
                    textToParse = textToParse.replace(/<think>([\s\S]*?)<\/think>/g, '<div class="think-box"><strong>تفکر:</strong><br>$1</div>');
                } else {
                    textToParse = textToParse.replace(/<think>([\s\S]*?)<\/think>/g, '');
                }
                
                const htmlContent = marked.parse(textToParse);
                const finalContent = imageHtml + htmlContent;

                return `
                <div class="flex flex-col ${msg.role === 'user' ? 'items-start message-user' : 'items-start message-bot'} p-4 rounded-lg w-full relative group border border-transparent hover:border-gray-700 transition-colors">
                    <div class="font-bold mb-2 text-sm text-gray-400 flex items-center w-full">
                        <i class="fa ${msg.role === 'user' ? 'fa-user text-blue-500' : 'fa-robot text-green-500'} ml-2"></i>
                        ${msg.role === 'user' ? settings.username : 'دستیار هوش مصنوعی'}
                        <div class="mr-auto flex items-center gap-3">
                            <button onclick="deleteMessage(${index})" class="text-gray-500 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="حذف پیام"><i class="fa fa-trash"></i></button>
                            <button onclick="openEditModal(${index})" class="text-gray-500 hover:text-blue-400 opacity-0 group-hover:opacity-100 transition-opacity" title="ویرایش پیام"><i class="fa fa-pencil"></i></button>
                            <span class="text-xs text-gray-600 font-normal">${msg.time || ''}</span>
                        </div>
                    </div>
                    <div class="markdown-body w-full overflow-hidden text-sm leading-relaxed">${finalContent}</div>
                </div>`;
            }).join('');
            
            // رندر کردن فرمول‌های ریاضی با KaTeX
            renderMathInElement(container, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\\(', right: '\\\)', display: false},
                    {left: '\\\[', right: '\\\]', display: true}
                ],
                throwOnError: false
            });

            container.scrollTop = container.scrollHeight;
        }

        // Stats (Words & Tokens Percent)
        function updateStats() {
            const textInput = document.getElementById('message-input').value.trim();
            const count = textInput ? textInput.split(/\s+/).length : 0;
            document.getElementById('word-count').innerText = `تعداد کلمات: ${count}`;

            const chat = getCurrentChat();
            let totalChars = settings.systemPrompt.length + textInput.length;
            
            if (chat) {
                chat.messages.forEach(m => {
                    if (Array.isArray(m.content)) {
                        const txt = m.content.find(c => c.type === 'text')?.text || '';
                        totalChars += txt.length + 500; // 500 کاراکتر فرضی بابت وزن پردازش عکس
                    } else {
                        totalChars += m.content.length;
                    }
                });
            }
            const usedTokens = Math.ceil(totalChars / 3.5);
            let percent = ((usedTokens / MAX_TOKENS) * 100).toFixed(1);
            if (percent > 100) percent = 100;
            
            const tokenElement = document.getElementById('token-count');
            tokenElement.innerHTML = `مصرف توکن: ${usedTokens} / ${MAX_TOKENS} (<span dir="ltr">${percent}%</span>)`;
            
            if (percent > 90) tokenElement.classList.add('text-red-400');
            else tokenElement.classList.remove('text-red-400');
        }

        // Message Editing and Deletion
        function deleteMessage(index) {
            if (isGenerating) return;
            if (confirm('آیا از حذف این پیام اطمینان دارید؟')) {
                const chat = getCurrentChat();
                chat.messages.splice(index, 1);
                saveData();
                renderMessages();
                updateStats();
            }
        }

        function openEditModal(index) {
            if (isGenerating) return;
            editingMessageIndex = index;
            const chat = getCurrentChat();
            
            let txtContent = chat.messages[index].content;
            if (Array.isArray(txtContent)) {
                txtContent = txtContent.find(c => c.type === 'text')?.text || '';
            }
            
            document.getElementById('edit-content').value = txtContent;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            editingMessageIndex = -1;
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function saveEditMessage() {
            if (editingMessageIndex > -1) {
                const chat = getCurrentChat();
                const isUserMessage = chat.messages[editingMessageIndex].role === 'user';
                const newTextContent = document.getElementById('edit-content').value;
                
                // اگر پیام اصلی آرایه (شامل عکس) بوده، آرایه را حفظ می‌کنیم
                if (Array.isArray(chat.messages[editingMessageIndex].content)) {
                    const imgObj = chat.messages[editingMessageIndex].content.find(c => c.type === 'image_url');
                    chat.messages[editingMessageIndex].content = [
                        { type: 'text', text: newTextContent },
                        ...(imgObj ? [imgObj] : [])
                    ];
                } else {
                    chat.messages[editingMessageIndex].content = newTextContent;
                }
                
                if (isUserMessage) {
                    chat.messages = chat.messages.slice(0, editingMessageIndex + 1);
                    saveData();
                    renderMessages();
                    updateStats();
                    closeEditModal();
                    await fetchAIResponse(chat);
                } else {
                    saveData();
                    renderMessages();
                    updateStats();
                    closeEditModal();
                }
            }
        }

        // Interaction
        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function toggleQuickThink() {
            settings.showThink = !settings.showThink;
            saveData();
            updateThinkButtonState();
            renderMessages();
        }

        function updateThinkButtonState() {
            const btn = document.getElementById('quick-think-btn');
            const text = document.getElementById('think-status-text');
            if(settings.showThink) {
                btn.classList.add('text-green-500');
                btn.classList.remove('text-gray-400');
                text.innerText = 'تفکر روشن';
            } else {
                btn.classList.remove('text-green-500');
                btn.classList.add('text-gray-400');
                text.innerText = 'تفکر خاموش';
            }
        }

        async function sendMessage() {
            if (isGenerating) return;
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text && !currentAttachment) return; // اگر هم متن خالی بود هم فایلی نبود ارسال نشود

            const chat = getCurrentChat();
            const timeStr = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
            
            let userContent = text;

            // ترکیب متن و پیوست
            if (currentAttachment) {
                if (currentAttachment.type === 'text') {
                    userContent = `${text}\n\n--- فایل: ${currentAttachment.name} ---\n${currentAttachment.data}\n--- پایان فایل ---`;
                } else if (currentAttachment.type === 'image') {
                    userContent = [
                        { type: "text", text: text || "این عکس را توصیف کن." },
                        { type: "image_url", image_url: { url: currentAttachment.data } }
                    ];
                }
            }

            chat.messages.push({ role: 'user', content: userContent, time: timeStr });
            if (chat.title === 'گفتگوی جدید') chat.title = text ? text.substring(0, 30) + '...' : (currentAttachment ? 'ارسال فایل' : '...');
            
            input.value = '';
            input.style.height = 'auto';
            removeAttachment(); // پاک کردن فایل بعد از ارسال
            updateStats();
            renderChatList();
            renderMessages();
            
            await fetchAIResponse(chat);
        }

        async function fetchAIResponse(chat) {
            isGenerating = true;
            abortController = new AbortController();
            
            document.getElementById('send-btn').classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');

            const container = document.getElementById('chat-container');
            const timeStr = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' });
            chat.messages.push({ role: 'assistant', content: '', time: timeStr });
            const botMsgIndex = chat.messages.length - 1;

            try {
                let finalSystemPrompt = settings.systemPrompt;
                if (settings.username && settings.username !== 'کاربر') {
                    finalSystemPrompt += `\n\n(Information: The user you are talking to is named "${settings.username}").`;
                }

                if (!settings.showThink) {
                    finalSystemPrompt += "\n\nCRITICAL INSTRUCTION: DO NOT use <think> tags. Answer directly without providing internal thoughts.";
                }

                const apiMessages = [{ role: 'system', content: finalSystemPrompt }];
                chat.messages.slice(0, -1).forEach(m => apiMessages.push({ role: m.role, content: m.content }));

                const requestBody = {
                    model: "local-model",
                    messages: apiMessages,
                    stream: true,
                    temperature: 0.7,
                    enable_thinking: settings.showThink
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody),
                    signal: abortController.signal
                });

                if (!response.ok) throw new Error('خطا در ارتباط با سرور LM Studio (آیا سرور داخلی را استارت کرده‌اید؟ مدل‌های بینایی ماشین برای عکس الزامی است)');

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        if (line.includes('[DONE]')) break;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.choices[0].delta.content) {
                                    chat.messages[botMsgIndex].content += data.choices[0].delta.content;
                                    renderMessages();
                                    updateStats(); 
                                }
                            } catch (e) { /* ignore parse errors */ }
                        }
                    }
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    chat.messages[botMsgIndex].content += '\n\n*(تولید متن متوقف شد)*';
                } else {
                    chat.messages[botMsgIndex].content += `\n\n**[خطا]** ${error.message}`;
                }
                renderMessages();
                updateStats();
            } finally {
                isGenerating = false;
                saveData();
                document.getElementById('send-btn').classList.remove('hidden');
                document.getElementById('stop-btn').classList.add('hidden');
            }
        }

        function stopGeneration() {
            if (abortController) {
                abortController.abort();
            }
        }

        // Tools & Settings
        function clearChats() {
            if(confirm('آیا از حذف تمام گفتگوها اطمینان دارید؟')) {
                localStorage.removeItem('ai_chats');
                localStorage.removeItem('ai_current_chat');
                chats = [];
                createNewChat();
            }
        }

        function exportChat() {
            const chat = getCurrentChat();
            if (!chat) return;
            let text = `${chat.title}\n\n`;
            chat.messages.forEach(m => {
                let contentText = m.content;
                if (Array.isArray(contentText)) {
                    contentText = contentText.find(c => c.type === 'text')?.text || '[محتوای تصویری]';
                }
                text += `[${m.role === 'user' ? settings.username : 'AI'}] - ${m.time}\n${contentText}\n\n-----------------\n\n`;
            });
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ChatExport_${Date.now()}.txt`;
            a.click();
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            if (modal.classList.contains('hidden')) {
                document.getElementById('set-username').value = settings.username;
                document.getElementById('set-system').value = settings.systemPrompt;
                document.getElementById('set-think').checked = settings.showThink;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveSettings() {
            settings.username = document.getElementById('set-username').value || 'کاربر';
            settings.systemPrompt = document.getElementById('set-system').value;
            settings.showThink = document.getElementById('set-think').checked;
            saveData();
            updateThinkButtonState();
            toggleSettings();
            renderMessages();
            updateStats();
        }

        // Auto-resize textarea
        document.getElementById('message-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Voice Typing
        function toggleVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('مرورگر شما از تایپ صوتی پشتیبانی نمی‌کند.');
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'fa-IR';
            recognition.onresult = (event) => {
                document.getElementById('message-input').value += event.results[0][0].transcript + ' ';
                updateStats();
            };
            recognition.start();
        }
    </script>
</body>
