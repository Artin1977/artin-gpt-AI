<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Artin gpt Web UI V1.8 (Multi-File, Vision & PDF)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- PDF.js for Reading PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #ececf1; }
        .sidebar { background-color: #121212; }
        .message-bot { background-color: #2d2d2d; }
        .message-user { background-color: #1e1e1e; }
        .markdown-body pre { background-color: #000; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; position: relative; direction: ltr;}
        .markdown-body code { font-family: monospace; color: #10b981; }
        .think-box { border-left: 4px solid #6b7280; background-color: #262626; padding: 0.5rem 1rem; margin: 0.5rem 0; border-radius: 0.25rem; font-style: italic; color: #9ca3af; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565869; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #acacbe; }
        
        /* KaTeX rtl fix */
        .katex-display { direction: ltr; overflow-x: auto; overflow-y: hidden; padding: 0.5rem 0; }
        .katex { direction: ltr; }
    </style>
</head>
<body class="h-[100dvh] flex overflow-hidden relative">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/60 z-30 md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar fixed right-0 top-0 h-[100dvh] z-40 w-64 transform translate-x-full md:translate-x-0 md:relative flex-shrink-0 flex flex-col p-2 transition-transform duration-300 border-l border-gray-700 md:border-none">
        <div class="flex justify-between items-center mb-4 md:hidden px-2 pt-2 text-gray-400">
            <span class="font-bold">منوی گفتگوها</span>
            <button onclick="toggleSidebar()" class="hover:text-white"><i class="fa fa-times text-xl"></i></button>
        </div>
        <button onclick="createNewChat(); if(window.innerWidth < 768) toggleSidebar();" class="flex items-center justify-center gap-2 p-3 border border-gray-600 rounded-md hover:bg-gray-700 transition w-full mb-4 text-sm font-semibold">
            <i class="fa fa-plus"></i> گفتگوی جدید
        </button>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-1 pr-1">
            <!-- لیست چت‌ها اینجا قرار می‌گیرد -->
        </div>
        <div class="mt-auto border-t border-gray-600 pt-2 space-y-2">
            <button onclick="toggleSettings(); if(window.innerWidth < 768) toggleSidebar();" class="flex items-center gap-2 p-3 rounded-md hover:bg-gray-700 w-full text-right text-sm">
                <i class="fa fa-cog"></i> تنظیمات کاربر
            </button>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col w-full h-[100dvh]">
        <!-- Header -->
        <div class="h-14 border-b border-gray-600 flex items-center justify-between px-4 bg-[#1e1e1e] shadow-sm flex-none z-10">
            <div class="flex items-center gap-3 overflow-hidden">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white transition">
                    <i class="fa fa-bars text-lg"></i>
                </button>
                <h1 id="chat-title" class="font-semibold truncate text-gray-200">گفتگوی جدید</h1>
            </div>
            <div class="flex gap-3 md:gap-4 items-center text-gray-400">
                <button id="quick-think-btn" onclick="toggleQuickThink()" title="روشن/خاموش کردن تفکر (Thinking)" class="flex items-center gap-2 px-2 py-1 rounded transition-colors hover:bg-gray-700">
                    <i class="fa fa-brain"></i> <span class="text-xs font-semibold hidden sm:inline" id="think-status-text">تفکر روشن</span>
                </button>
                <div class="w-px h-6 bg-gray-600"></div>
                <button onclick="exportChat()" title="خروجی TXT"><i class="fa fa-download hover:text-white"></i></button>
                <button onclick="clearChats()" title="حذف همه داده‌ها"><i class="fa fa-trash hover:text-red-500"></i></button>
            </div>
        </div>

        <!-- Messages -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-2 md:p-4 space-y-6 scroll-smooth w-full">
            <!-- پیام‌ها اینجا قرار می‌گیرند -->
        </div>

        <!-- Input Area (Fixed relative to layout, not absolute) -->
        <div class="flex-none bg-[#1e1e1e] p-2 md:p-4 z-20 w-full border-t border-gray-700 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.3)]">
            <div class="max-w-4xl mx-auto relative">
                
                <!-- Attachment Preview (Multi-file) -->
                <div id="attachment-preview" class="hidden absolute bottom-[calc(100%+0.5rem)] right-0 bg-[#252526] p-2 rounded-lg border border-gray-600 shadow-lg mb-2 max-w-full overflow-x-auto whitespace-nowrap">
                    <!-- محتوای پیوست با جاوااسکریپت تزریق می‌شود -->
                </div>

                <div class="flex items-end bg-[#252526] rounded-xl shadow-inner border border-gray-600 focus-within:border-gray-400 p-2">
                    
                    <!-- File Input Hidden -->
                    <input type="file" id="file-input" class="hidden" multiple accept="image/*,.txt,.py,.js,.html,.css,.json,.md,.csv,.pdf" onchange="handleFileUpload(event)">
                    
                    <button onclick="document.getElementById('file-input').click()" class="p-2 mb-1 text-gray-400 hover:text-white rounded-lg transition-colors flex-none" title="پیوست فایل (عکس، PDF، متن، کد)">
                        <i class="fa fa-paperclip"></i>
                    </button>
                    
                    <button id="mic-btn" onclick="toggleVoice()" class="p-2 mb-1 text-gray-400 hover:text-white rounded-lg flex-none" title="تایپ صوتی"><i class="fa fa-microphone"></i></button>
                    
                    <textarea id="message-input" rows="1" class="w-full bg-transparent text-white outline-none resize-none px-3 py-3 max-h-32" placeholder="پیام خود را بنویسید... (Shift+Enter خط جدید)" onkeydown="handleKeydown(event)"></textarea>
                    
                    <button id="stop-btn" onclick="stopGeneration()" class="hidden p-2 mb-1 text-red-500 hover:text-red-400 rounded-lg mx-1 flex-none" title="توقف تولید"><i class="fa fa-stop-circle text-xl"></i></button>
                    <button id="send-btn" onclick="sendMessage()" class="p-2 mb-1 text-gray-400 hover:bg-green-600 hover:text-white rounded-lg transition flex-none" title="ارسال"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
            
            <!-- مانیتورینگ توکن -->
            <div class="max-w-4xl mx-auto text-center text-[10px] sm:text-xs text-gray-500 mt-2 flex justify-between items-center px-2" id="stats-bar">
                <span id="word-count">تعداد کلمات: 0</span>
                <span id="token-count" class="font-mono transition-colors">مصرف توکن: 0 / 36671 (0.0%)</span>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-[#121212] w-full max-w-md p-6 rounded-lg shadow-xl border border-gray-700">
            <h2 class="text-xl mb-4 font-bold border-b border-gray-600 pb-2"><i class="fa fa-sliders"></i> تنظیمات سیستم</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-gray-300">نام کاربری شما:</label>
                    <input type="text" id="set-username" class="w-full bg-[#1e1e1e] text-white rounded p-2 outline-none border border-gray-600 focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-gray-300">دستورالعمل پایه (System Prompt):</label>
                    <textarea id="set-system" class="w-full bg-[#1e1e1e] text-white rounded p-2 outline-none border border-gray-600 h-24 focus:border-blue-500 transition resize-none"></textarea>
                </div>
                <div class="flex items-center justify-between bg-[#1e1e1e] p-3 rounded border border-gray-600">
                    <label class="text-sm text-gray-300">استفاده از قابلیت استدلال (Think)</label>
                    <input type="checkbox" id="set-think" class="w-4 h-4 accent-green-500">
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition">انصراف</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-500 transition">ذخیره تنظیمات</button>
            </div>
        </div>
    </div>

    <!-- Edit Message Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-[#121212] w-full max-w-lg p-6 rounded-lg shadow-xl border border-gray-700">
            <h2 class="text-xl mb-4 font-bold border-b border-gray-600 pb-2"><i class="fa fa-pencil"></i> ویرایش پیام</h2>
            <p class="text-[11px] sm:text-xs text-yellow-500 mb-2">توجه: در صورت ویرایش پیام خودتان، پیام‌های بعدی حذف شده و پاسخ جدیدی تولید می‌شود.</p>
            <textarea id="edit-content" class="w-full bg-[#1e1e1e] text-white rounded p-3 outline-none border border-gray-600 h-48 resize-none focus:border-blue-500"></textarea>
            <div class="mt-4 flex justify-end gap-2">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-700 text-white rounded hover:bg-gray-600 transition">انصراف</button>
                <button onclick="saveEditMessage()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-500 transition text-sm sm:text-base">اعمال و بازسازی</button>
            </div>
        </div>
    </div>

    <script>
        // تنظیمات ورکر برای PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const API_URL = 'https://passive-chubby-shelf.ngrok-free.dev/v1/chat/completions';

        const MAX_TOKENS = 36671;
        let chats = JSON.parse(localStorage.getItem('ai_chats')) || [];
        let currentChatId = localStorage.getItem('ai_current_chat') || null;
        let settings = JSON.parse(localStorage.getItem('ai_settings')) || { 
            username: 'کاربر', 
            systemPrompt: 'شما یک دستیار هوش مصنوعی مفید هستید. لطفا برای فرمول‌های ریاضی همیشه از علامت $ استفاده کن.', 
            showThink: true 
        };
        
        let abortController = null;
        let isGenerating = false;
        let editingMessageIndex = -1;
        let currentAttachments = []; 

        document.addEventListener('DOMContentLoaded', () => {
            if (chats.length === 0) createNewChat();
            else {
                if (!currentChatId || !chats.find(c => c.id === currentChatId)) currentChatId = chats[0].id;
                renderChatList();
                renderMessages();
                updateStats();
            }
            document.getElementById('message-input').addEventListener('input', updateStats);
            updateThinkButtonState();
        });

        // ================= مدیریت سایدبار در موبایل =================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // ================= فایل‌ها و پیوست‌های چندگانه =================
        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            document.getElementById('send-btn').disabled = true; 
            document.getElementById('send-btn').classList.add('opacity-50');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.size > 5 * 1024 * 1024) {
                    alert(`حجم فایل ${file.name} بیشتر از ۵ مگابایت است و نادیده گرفته شد.`);
                    continue;
                }
                await processFile(file);
            }

            renderAttachmentPreview();
            event.target.value = ''; 
            
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').classList.remove('opacity-50');
        }

        function processFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                
                if (file.name.toLowerCase().endsWith('.pdf') || file.type === 'application/pdf') {
                    reader.onload = async function(e) {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            let fullText = '';
                            
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(' ');
                                fullText += `\n\n--- صفحه ${i} ---\n` + pageText;
                            }

                            currentAttachments.push({ type: 'text', data: fullText.trim(), name: file.name });
                        } catch (error) {
                            console.error(`خطا در خواندن فایل PDF ${file.name}:`, error);
                        }
                        resolve();
                    };
                    reader.readAsArrayBuffer(file);
                } 
                else if (file.type.startsWith('image/')) {
                    reader.onload = function(e) {
                        currentAttachments.push({ type: 'image', data: e.target.result, name: file.name });
                        resolve();
                    };
                    reader.readAsDataURL(file);
                } 
                else { 
                    reader.onload = function(e) {
                        currentAttachments.push({ type: 'text', data: e.target.result, name: file.name });
                        resolve();
                    };
                    reader.readAsText(file);
                }
            });
        }

        function renderAttachmentPreview() {
            const previewBox = document.getElementById('attachment-preview');
            if (currentAttachments.length === 0) {
                previewBox.classList.add('hidden');
                return;
            }
            
            previewBox.classList.remove('hidden');
            let contentHtml = '<div class="flex gap-3 pb-1">';
            
            currentAttachments.forEach((att, index) => {
                if (att.type === 'image') {
                    contentHtml += `
                        <div class="relative group p-1 bg-white rounded flex-shrink-0 items-center justify-center inline-block">
                            <button onclick="removeAttachment(${index})" class="absolute -top-2 -right-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-full w-5 h-5 flex items-center justify-center text-xs shadow-md transition z-10"><i class="fa fa-times"></i></button>
                            <img src="${att.data}" class="h-12 w-12 object-contain rounded">
                        </div>
                    `;
                } else {
                    const isPdf = att.name.toLowerCase().endsWith('.pdf');
                    const iconClass = isPdf ? 'fa-file-pdf text-red-500' : 'fa-file-alt text-gray-400';
                    const fileTypeLabel = isPdf ? 'PDF Document' : 'Text File';

                    contentHtml += `
                        <div class="relative bg-[#353535] rounded-md py-1 px-3 flex-shrink-0 flex flex-col justify-center min-w-[100px] max-w-[150px] inline-block">
                            <button onclick="removeAttachment(${index})" class="absolute -top-2 -right-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-full w-5 h-5 flex items-center justify-center text-xs shadow-md transition z-10"><i class="fa fa-times"></i></button>
                            <div class="flex items-center gap-2">
                                <div class="flex-1 min-w-0">
                                    <p class="text-xs text-white truncate" dir="ltr" title="${att.name}">${att.name}</p>
                                    <p class="text-[10px] text-gray-400">${fileTypeLabel}</p>
                                </div>
                                <i class="fa ${iconClass} text-xl"></i>
                            </div>
                        </div>
                    `;
                }
            });
            contentHtml += '</div>';
            previewBox.innerHTML = contentHtml;
        }

        function removeAttachment(index) {
            currentAttachments.splice(index, 1);
            renderAttachmentPreview();
        }

        // ================= Core Functions =================
        function createNewChat() {
            if (isGenerating) return;
            const newChat = { id: Date.now().toString(), title: 'گفتگوی جدید', messages: [] };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveData();
            renderChatList();
            renderMessages();
            updateStats();
        }

        function saveData() {
            localStorage.setItem('ai_chats', JSON.stringify(chats));
            localStorage.setItem('ai_current_chat', currentChatId);
            localStorage.setItem('ai_settings', JSON.stringify(settings));
        }

        function getCurrentChat() {
            return chats.find(c => c.id === currentChatId);
        }

        function switchChat(id) {
            if (isGenerating) return;
            currentChatId = id;
            saveData();
            renderChatList();
            renderMessages();
            updateStats();
            if(window.innerWidth < 768) toggleSidebar(); // بستن منو در موبایل بعد از انتخاب
        }

        function editChatTitle(id) {
            if (isGenerating) return;
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            const newTitle = prompt('عنوان جدید این گفتگو را وارد کنید:', chat.title);
            if (newTitle !== null && newTitle.trim() !== '') {
                chat.title = newTitle.trim();
                saveData();
                renderChatList();
            }
        }

        function deleteSingleChat(id) {
            if (isGenerating) return;
            if (confirm('آیا از حذف این گفتگو مطمئن هستید؟')) {
                chats = chats.filter(c => c.id !== id);
                if (chats.length === 0) createNewChat();
                else if (currentChatId === id) switchChat(chats[0].id);
                else {
                    saveData();
                    renderChatList();
                }
            }
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(chat => `
                <div class="flex items-center justify-between w-full p-2 rounded-md transition group ${chat.id === currentChatId ? 'bg-gray-700 text-white' : 'hover:bg-gray-800 text-gray-400'}">
                    <button onclick="switchChat('${chat.id}')" class="flex-1 text-right truncate flex items-center text-sm">
                        <i class="fa fa-message ml-2 text-xs opacity-70"></i>
                        <span class="truncate">${chat.title}</span>
                    </button>
                    <div class="flex items-center opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity pr-2 gap-3 md:gap-2 text-sm md:text-xs">
                        <button onclick="editChatTitle('${chat.id}')" class="hover:text-blue-400 transition-colors" title="ویرایش عنوان"><i class="fa fa-pencil"></i></button>
                        <button onclick="deleteSingleChat('${chat.id}')" class="hover:text-red-500 transition-colors" title="حذف گفتگو"><i class="fa fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('chat-title').innerText = getCurrentChat()?.title || 'LM Studio';
        }

        function renderMessages() {
            const container = document.getElementById('chat-container');
            const chat = getCurrentChat();
            if (!chat || chat.messages.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-500 space-y-4 opacity-50">
                    <i class="fa fa-robot text-5xl md:text-6xl"></i>
                    <p class="text-sm md:text-base">آماده گفتگو با شما</p>
                </div>`;
                return;
            }

            container.innerHTML = chat.messages.map((msg, index) => {
                let rawContent = msg.content;
                let textToParse = '';
                let imageHtml = '';

                if (Array.isArray(rawContent)) {
                    const textObj = rawContent.find(c => c.type === 'text');
                    const imgObjs = rawContent.filter(c => c.type === 'image_url');
                    
                    if (textObj) textToParse = textObj.text;
                    
                    if (imgObjs.length > 0) {
                        imageHtml = '<div class="flex flex-wrap gap-2 mb-3">';
                        imgObjs.forEach(img => {
                            imageHtml += `<img src="${img.image_url.url}" class="max-w-[200px] sm:max-w-xs max-h-48 sm:max-h-64 object-cover rounded-lg shadow-md border border-gray-600">`;
                        });
                        imageHtml += '</div>';
                    }
                } else {
                    textToParse = rawContent;
                }

                if (settings.showThink) {
                    textToParse = textToParse.replace(/<think>([\s\S]*?)<\/think>/g, '<div class="think-box"><strong>تفکر:</strong><br>$1</div>');
                } else {
                    textToParse = textToParse.replace(/<think>([\s\S]*?)<\/think>/g, '');
                }
                
                const htmlContent = marked.parse(textToParse);
                const finalContent = imageHtml + htmlContent;

                return `
                <div class="flex flex-col ${msg.role === 'user' ? 'items-start message-user' : 'items-start message-bot'} p-3 md:p-4 rounded-lg w-full relative group border border-transparent hover:border-gray-700 transition-colors">
                    <div class="font-bold mb-2 text-xs md:text-sm text-gray-400 flex items-center w-full">
                        <i class="fa ${msg.role === 'user' ? 'fa-user text-blue-500' : 'fa-robot text-green-500'} ml-2"></i>
                        ${msg.role === 'user' ? settings.username : 'دستیار هوش مصنوعی'}
                        <div class="mr-auto flex items-center gap-3">
                            <button onclick="deleteMessage(${index})" class="text-gray-500 hover:text-red-500 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity" title="حذف پیام"><i class="fa fa-trash"></i></button>
                            <button onclick="openEditModal(${index})" class="text-gray-500 hover:text-blue-400 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity" title="ویرایش پیام"><i class="fa fa-pencil"></i></button>
                            <span class="text-[10px] md:text-xs text-gray-600 font-normal">${msg.time || ''}</span>
                        </div>
                    </div>
                    <div class="markdown-body w-full overflow-hidden text-sm leading-relaxed">${finalContent}</div>
                </div>`;
            }).join('');
            
            renderMathInElement(container, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\\\(', right: '\\\\)', display: false},
                    {left: '\\\\[', right: '\\\\]', display: true}
                ],
                throwOnError: false
            });

            container.scrollTop = container.scrollHeight;
        }

        function updateStats() {
            const textInput = document.getElementById('message-input').value.trim();
            const count = textInput ? textInput.split(/\s+/).length : 0;
            document.getElementById('word-count').innerText = `تعداد کلمات: ${count}`;

            const chat = getCurrentChat();
            let totalChars = settings.systemPrompt.length + textInput.length;
            
            if (chat) {
                chat.messages.forEach(m => {
                    if (Array.isArray(m.content)) {
                        const txt = m.content.find(c => c.type === 'text')?.text || '';
                        const imgCount = m.content.filter(c => c.type === 'image_url').length;
                        totalChars += txt.length + (imgCount * 500); 
                    } else {
                        totalChars += m.content.length;
                    }
                });
            }
            const usedTokens = Math.ceil(totalChars / 3.5);
            let percent = ((usedTokens / MAX_TOKENS) * 100).toFixed(1);
            if (percent > 100) percent = 100;
            
            const tokenElement = document.getElementById('token-count');
            tokenElement.innerHTML = `مصرف توکن: ${usedTokens} / ${MAX_TOKENS} (<span dir="ltr">${percent}%</span>)`;
            
            if (percent > 90) tokenElement.classList.add('text-red-400');
            else tokenElement.classList.remove('text-red-400');
        }
